    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .wishlist-card { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Shop buttons keep white text */
        .shop-btn { color: white !important; }
        .shop-btn:hover { color: white !important; }
        .wishlist-action-btn { color: #1a1a1a !important; }
        .wishlist-action-btn:hover { color: white !important; }
    </style>
</head>
<body>
    <main class="pt-24 min-h-screen">
        <section class="py-16 px-6 md:px-12">
            <div class="max-w-6xl mx-auto">
                <div class="text-center mb-12">
                    <span class="text-secondary font-semibold uppercase tracking-widest text-sm mb-3 block">Collection</span>
                    <h1 class="text-4xl md:text-5xl font-bold playfair mb-4">My Wishlist</h1>
                    <p class="text-gray-500 max-w-md mx-auto">Items you've saved for later. Move them to your cart when you're ready.</p>
                </div>

                <!-- Empty State -->
                <div id="wishlist-empty" class="hidden text-center py-24">
                    <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-gray-100 flex items-center justify-center">
                        <i class="fas fa-heart text-4xl text-gray-300"></i>
                    </div>
                    <h3 class="text-2xl font-bold playfair mb-3">Your wishlist is empty</h3>
                    <p class="text-gray-500 mb-8">Save items you love so you can come back to them anytime.</p>
                    <a href="shop.html" class="btn-gradient px-10 py-4 rounded-full font-bold inline-block">Browse the Shop</a>
                </div>

                <!-- Wishlist Grid -->
                <div id="wishlist-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

                <!-- CTA when wishlist has items -->
                <div id="wishlist-cta" class="hidden text-center mt-12">
                    <a href="shop.html" class="btn-gradient px-10 py-4 rounded-full font-bold inline-block mr-3">Continue Shopping</a>
                    <a href="cart.html" class="border-2 border-gray-300 px-10 py-4 rounded-full font-bold hover:bg-gray-50 transition inline-block">View Cart</a>
                </div>
            </div>
        </section>
    </main>

        function renderWishlist() {
            const wlIds = getWishlist();
            const $container = $('#wishlist-container');
            const $empty = $('#wishlist-empty');
            const $cta = $('#wishlist-cta');

            if (wlIds.length === 0) {
                $container.empty();
                $empty.removeClass('hidden');
                $cta.addClass('hidden');
                return;
            }

            $empty.addClass('hidden');
            $cta.removeClass('hidden');

            const items = ALL_WISHLIST_ITEMS.filter(i => wlIds.includes(i.id));
            let html = '';

            items.forEach(item => {
                html += `
                    <div class="wishlist-card bg-white p-6 rounded-3xl shadow-lg border border-gray-50 text-left flex flex-col group hover:shadow-2xl transition-all" data-id="${item.id}">
                        <div class="h-56 overflow-hidden rounded-2xl mb-5 relative">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&q=80&w=600';">
                            <span class="absolute top-3 left-3 text-xs font-bold uppercase tracking-wider bg-white/90 backdrop-blur px-3 py-1 rounded-full text-secondary shadow">${item.religion}</span>
                        </div>
                        <h4 class="text-xl font-bold mb-2">${item.title}</h4>
                        <span class="text-2xl font-bold text-secondary mb-4">$${item.price.toFixed(2)}</span>

                        <div class="flex gap-3 mt-auto">
                            <button class="btn-gradient shop-btn flex-1 px-5 py-2.5 rounded-full text-sm font-bold move-to-cart" data-id="${item.id}">
                                <i class="fas fa-cart-plus mr-1"></i> Add to Cart
                            </button>
                            <button class="wishlist-action-btn flex-1 px-5 py-2.5 rounded-full text-sm font-bold border-2 border-gray-200 hover:border-accent hover:bg-accent remove-from-wishlist" data-id="${item.id}">
                                <i class="fas fa-trash mr-1"></i> Remove
                            </button>
                        </div>
                    </div>
                `;
            });

            $container.html(html);
        }

        $(document).ready(function() {
            renderWishlist();
            updateWishlistCount();

            // Move item from wishlist → cart
            $(document).on('click', '.move-to-cart', function() {
                const id = parseInt($(this).data('id'), 10);
                const item = ALL_WISHLIST_ITEMS.find(i => i.id === id);
                if (!item) return;

                let cart = JSON.parse(localStorage.getItem('spirita-cart')) || [];
                const existing = cart.find(c => c.id === id);
                if (existing) existing.qty++;
                else cart.push({ ...item, qty: 1 });
                localStorage.setItem('spirita-cart', JSON.stringify(cart));

                // Remove from wishlist
                removeFromWishlist(id);

                // Animate card removal then re-render
                const $card = $(this).closest('.wishlist-card');
                $card.fadeOut(300, function() { renderWishlist(); });

                window.updateCartCount && window.updateCartCount();
            });

            // Remove from wishlist directly
            $(document).on('click', '.remove-from-wishlist', function() {
                const id = parseInt($(this).data('id'), 10);
                removeFromWishlist(id);
                const $card = $(this).closest('.wishlist-card');
                $card.fadeOut(300, function() { renderWishlist(); });
            });
        });
    </script>
</body>
</html>
