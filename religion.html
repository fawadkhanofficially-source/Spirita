                gallery: [
                    { src: 'https://images.pexels.com/photos/36365735/pexels-photo-36365735.jpeg', title: 'Vesak', desc: 'Lighting lanterns to commemorate the birth, enlightenment, and death of Gautama Buddha.' },

                    { src: 'https://images.pexels.com/photos/34165917/pexels-photo-34165917.jpeg', title: 'Losar Spirit', desc: 'Vibrant colors and community joy during the Tibetan spiritual holidays.' },
                    { src: 'https://images.pexels.com/photos/5718260/pexels-photo-5718260.jpeg', title: 'Nirvana Day Reflection', desc: 'Contemplating the final passing of the Buddha and the teachings on impermanence.' },

                    { src: 'https://images.pexels.com/photos/32059563/pexels-photo-32059563.jpeg', title: 'Prayer Flags', desc: 'Colorful Tibetan prayer flags carrying mantras of peace on the mountain wind.' },

            }
        };

        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const rel = urlParams.get('rel') || 'Islam';
            const data = religionData[rel];

            if(data) {
                // Determine images for the slider based on the religion
                const sliderImages = data.gallery.slice(0, 4); // Use first 4 gallery items for hero

                const heroSection = `
                    <div class="h-[450px] w-full rounded-3xl overflow-hidden relative mb-16 shadow-2xl flex flex-col md:flex-row bg-white border border-gray-100">
                        <div class="flex-1 p-10 flex flex-col justify-center bg-gray-50">
                            <span class="text-secondary font-bold uppercase tracking-widest text-sm mb-2">Sacred Journey</span>
                            <h1 class="text-6xl font-bold playfair mb-6 leading-tight">About <br><span class="text-primary">${data.title}</span></h1>
                            <p class="text-gray-600 text-lg mb-8 leading-relaxed max-w-md">${data.intro}</p>
                            <button onclick="$('html, body').animate({scrollTop: $('#gallery-anchor').offset().top - 100}, 800)" class="btn-gradient px-10 py-4 rounded-full font-bold self-start shadow-xl">Explore Image Gallery</button>
                        </div>
                        <div class="flex-1 relative overflow-hidden group">
                            <div id="hindu-hero-slider" class="h-full w-full">
                                ${sliderImages.map((img, i) => `
                                    <div class="hindu-hero-slide absolute inset-0 opacity-0 transition-opacity duration-1000 ${i===0?'opacity-100 z-10':''}" data-index="${i}">
                                        <img src="${img.src}" class="w-full h-full object-cover">
                                        <div class="absolute bottom-10 left-10 text-white z-20">
                                            <h3 class="text-3xl font-bold playfair !text-white">${img.title}</h3>
                                            <p class="!text-white opacity-80">${img.desc.split('.')[0]}.</p>
                                        </div>
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <!-- Slider Controls -->
                            <div class="absolute bottom-8 right-8 flex gap-4 z-30 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button id="prev-hindu-hero" class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white border border-white/30 hover:bg-white hover:text-dark transition"><i class="fas fa-chevron-left"></i></button>
                                <button id="next-hindu-hero" class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white border border-white/30 hover:bg-white hover:text-dark transition"><i class="fas fa-chevron-right"></i></button>
                            </div>
                            
                            <!-- Pagination -->
                            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-2 z-30">
                                ${sliderImages.map((_, i) => `<div class="hindu-hero-dot w-2 h-2 rounded-full ${i===0?'bg-white w-6':'bg-white/50'} transition-all cursor-pointer" data-index="${i}"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div id="gallery-anchor"></div>
                `;

                const html = `
                    <div class="px-6 md:px-12 py-12 animate-fadeIn">
                        ${heroSection}
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-20">
                            <div class="md:col-span-2">
                                <h2 class="text-3xl font-bold mb-4 playfair">Philosophy</h2>
                                <p class="text-gray-600 text-lg mb-8">${data.intro}</p>
                                <p class="italic border-l-4 border-secondary pl-6 mb-12 text-gray-500">${data.importance}</p>
                                
                                <h2 class="text-3xl font-bold mb-6 playfair">Major Festivals</h2>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-12">
                                    ${data.festivals.map(f => `
                                        <div class="p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
                                            <h4 class="font-bold text-secondary mb-2">${f.name}</h4>
                                            <p class="text-sm text-gray-500">${f.info}</p>
                                        </div>
                                    `).join('')}
                                </div>

                                <h2 class="text-3xl font-bold mb-6 playfair">History</h2>
                                <div class="space-y-4">
                                    ${data.timeline.map(t => `
                                        <div class="flex gap-4">
                                            <span class="bg-primary text-white px-3 py-1 rounded-full text-xs font-bold h-fit">${t.year}</span>
                                            <p class="text-gray-600">${t.event}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-50 mb-8 text-center">
                                    <h3 class="text-xl font-bold mb-4">Sacred Symbol</h3>
                                    <i class="fas ${data.icon} text-7xl text-secondary"></i>
                                </div>
                                <div class="bg-gray-50 p-8 rounded-3xl">
                                    <h3 class="text-xl font-bold mb-4">Top Pilgrimages</h3>
                                    <ul class="space-y-3">
                                        ${data.places.map(p => `<li class="flex gap-2 items-center"><i class="fas fa-location-dot text-primary"></i> ${p}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <!-- Video Section -->
                        <section class="mb-20">
                            <h2 class="text-4xl font-bold playfair mb-8 text-center">Sacred Visuals</h2>
                            <div class="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video max-w-5xl mx-auto relative">
                                <iframe 
                                    class="w-full h-full" 
                                    src="https://www.youtube.com/embed/${data.videoId}" 
                                    title="YouTube video player" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                    referrerpolicy="strict-origin-when-cross-origin" 
                                    allowfullscreen>
                                </iframe>
                            </div>
                        </section>

                        <!-- Image Gallery -->
                        <section class="mb-20">
                            <h2 class="text-4xl font-bold playfair mb-8 text-center">Cultural Gallery</h2>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${data.gallery.map((img, idx) => `
                                    <div class="h-64 rounded-2xl overflow-hidden group relative cursor-pointer gallery-item" 
                                         data-title="${img.title}" 
                                         data-desc="${img.desc}" 
                                         data-src="${img.src}">
                                        <img src="${img.src}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-4 text-center">
                                            <span class="text-white font-bold text-lg playfair">${img.title}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>

                    <!-- Image Modal -->
                    <div id="gallery-modal" class="fixed inset-0 bg-black/90 z-[3000] hidden items-center justify-center p-6">
                        <button id="close-gallery" class="absolute top-8 right-8 text-white text-3xl z-[3001]"><i class="fas fa-times"></i></button>
                        
                        <button id="prev-image" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 gallery-nav-btn w-12 h-12 rounded-full flex items-center justify-center text-2xl z-[3001]">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        
                        <div class="max-w-4xl w-full bg-white rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl relative">
                            <div class="md:w-2/3 h-80 md:h-[500px]">
                                <img id="modal-image" src="" class="w-full h-full object-cover">
                            </div>
                            <div class="md:w-1/3 p-8 flex flex-col justify-center">
                                <h3 id="modal-image-title" class="text-3xl font-bold playfair mb-4"></h3>
                                <p id="modal-image-desc" class="text-gray-600 leading-relaxed"></p>
                            </div>
                        </div>

                        <button id="next-image" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 gallery-nav-btn w-12 h-12 rounded-full flex items-center justify-center text-2xl z-[3001]">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                `;
                $('#religion-page-content').html(html);
            }

            // Gallery Modal Logic
            let currentGalleryIndex = 0;
            let currentGalleryData = [];

            $(document).on('click', '.gallery-item', function() {
                currentGalleryData = data.gallery;
                currentGalleryIndex = $('.gallery-item').index(this);
                updateModalContent();
                $('#gallery-modal').css('display', 'flex').hide().fadeIn();
            });

            function updateModalContent() {
                const item = currentGalleryData[currentGalleryIndex];
                $('#modal-image').fadeOut(200, function() {
                    $(this).attr('src', item.src).fadeIn(200);
                });
                $('#modal-image-title').text(item.title);
                $('#modal-image-desc').text(item.desc);
            }

            $(document).on('click', '#next-image', function(e) {
                e.stopPropagation();
                currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryData.length;
                updateModalContent();
            });

            $(document).on('click', '#prev-image', function(e) {
                e.stopPropagation();
                currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryData.length) % currentGalleryData.length;
                updateModalContent();
            });

            $(document).on('click', '#close-gallery, #gallery-modal', function(e) {
                if (e.target !== this && !$(e.target).closest('#close-gallery').length) return;
                $('#gallery-modal').fadeOut();
            });

            // Hinduism Hero Slider Logic
            if($('#hindu-hero-slider').length) {
                let hinduSlideIndex = 0;
                const slides = $('.hindu-hero-slide');
                const dots = $('.hindu-hero-dot');
                
                function showHinduSlide(n) {
                    slides.removeClass('z-10 opacity-100').addClass('opacity-0');
                    dots.removeClass('bg-white w-6').addClass('bg-white/50');
                    
                    hinduSlideIndex = (n + slides.length) % slides.length;
                    
                    slides.eq(hinduSlideIndex).addClass('z-10 opacity-100');
                    dots.eq(hinduSlideIndex).addClass('bg-white w-6').removeClass('bg-white/50');
                }

                $('#next-hindu-hero').click(() => showHinduSlide(hinduSlideIndex + 1));
                $('#prev-hindu-hero').click(() => showHinduSlide(hinduSlideIndex - 1));
                $('.hindu-hero-dot').click(function() { showHinduSlide($(this).data('index')); });

                // Constant Auto Movement
                setInterval(() => {
                    showHinduSlide(hinduSlideIndex + 1);
                }, 5000);
            }
        });
    </script>
</body>
</html>
