<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Spirita</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Login Page Specific Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 25%, #d1fae5 75%, #f0f9ff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(140, 192, 235, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            animation: float 20s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(47, 160, 132, 0.12) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            padding: 48px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.95rem;
            color: #111827;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(47, 160, 132, 0.1);
        }

        .form-input:focus + i,
        .form-input:focus ~ i {
            color: var(--secondary);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease;
            z-index: 2;
            transform-style: preserve-3d;
            will-change: color;
            animation: none !important;
        }

        .password-toggle i {
            pointer-events: none;
            animation: none !important;
        }

        .password-toggle:hover {
            color: var(--secondary);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: #4b5563;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--secondary);
            cursor: pointer;
        }

        .forgot-password {
            font-size: 0.875rem;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(47, 160, 132, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(47, 160, 132, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: var(--secondary);
            background: rgba(47, 160, 132, 0.05);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.2rem;
            color: #4b5563;
        }

        .social-btn.google i { color: #DB4437; }
        .social-btn.facebook i { color: #4267B2; }
        .social-btn.twitter i { color: #1DA1F2; }

        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .register-link a {
            color: var(--secondary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: var(--primary);
        }

        .error-message {
            background: rgba(255, 0, 0, 0.08);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .success-message {
            background: rgba(47, 160, 132, 0.08);
            border: 1px solid rgba(47, 160, 132, 0.2);
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                margin: 16px;
            }

            .login-logo-text {
                font-size: 1.75rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .social-login {
                flex-direction: column;
            }
        }

        /* Override global styles that may affect login page */
        .login-container body, .login-container p, .login-container span, 
        .login-container h1, .login-container h2, .login-container h3, 
        .login-container h4, .login-container h5, .login-container h6, 
        .login-container li, .login-container a {
            color: inherit;
        }

        .login-card .text-white {
            color: white !important;
        }

        .login-card {
            color: #1a1a1a;
        }

        .login-card a {
            color: inherit;
        }

        .login-card a:hover {
            color: var(--secondary);
        }

        .divider span {
            color: #9ca3af !important;
        }

        .register-link {
            color: #6b7280 !important;
        }

        .register-link a {
            color: var(--secondary) !important;
        }

        .remember-me {
            color: #4b5563 !important;
        }

        .forgot-password {
            color: var(--secondary) !important;
        }

        .form-label {
            color: #374151 !important;
        }

        .form-input {
            color: #111827 !important;
        }

        .login-subtitle {
            color: #6b7280 !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <a href="index.html" class="flex items-center justify-center">
                    <img src="Assets/icons/logo.png" alt="Spirita logo" class="w-16 h-16 object-contain" />
                </a>
            </div>

            <!-- Title -->
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to continue your spiritual journey</p>

            <!-- Error Message -->
            <div id="error-message" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Invalid credentials. Please try again.</span>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span id="success-text">Login successful! Redirecting...</span>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="form-input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="form-input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility"> 
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" id="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button type="button" class="social-btn google" aria-label="Sign in with Google">
                    <i class="fab fa-google"></i>
                </button>
                <button type="button" class="social-btn facebook" aria-label="Sign in with Facebook">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button type="button" class="social-btn twitter" aria-label="Sign in with Twitter">
                    <i class="fab fa-twitter"></i>
                </button>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        $(document).ready(function() {
            // Toggle password visibility
            $('#toggle-password').on('click', function() {
                const passwordInput = $('#password');
                const icon = $(this).find('i');
                
                if (passwordInput.attr('type') === 'password') {
                    passwordInput.attr('type', 'text');
                    icon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    passwordInput.attr('type', 'password');
                    icon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            });

            // Handle login form submission
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                
                const email = $('#email').val().trim();
                const password = $('#password').val();
                const remember = $('#remember').is(':checked');

                // Hide any existing messages
                $('#error-message').hide();
                $('#success-message').hide();

                // Basic validation
                if (!email || !password) {
                    showError('Please fill in all fields.');
                    return;
                }

                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('Please enter a valid email address.');
                    return;
                }

                // Simulate login (in a real app, this would be an API call)
                // For demo purposes, accept any valid email format with password "password"
                const storedUser = localStorage.getItem('spirita-user');
                
                if (storedUser) {
                    const user = JSON.parse(storedUser);
                    if (email === user.email && password === user.password) {
                        // Successful login
                        if (remember) {
                            localStorage.setItem('spirita-logged-in', 'true');
                            localStorage.setItem('spirita-current-user', JSON.stringify({
                                email: user.email,
                                name: user.name
                            }));
                        } else {
                            sessionStorage.setItem('spirita-logged-in', 'true');
                            sessionStorage.setItem('spirita-current-user', JSON.stringify({
                                email: user.email,
                                name: user.name
                            }));
                        }

                        showSuccess('Login successful! Redirecting...');
                        
                        setTimeout(function() {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        showError('Invalid email or password. Please try again.');
                    }
                } else {
                    // For demo: allow login with any email if no user is registered
                    // This is just for testing the login page
                    if (remember) {
                        localStorage.setItem('spirita-logged-in', 'true');
                        localStorage.setItem('spirita-current-user', JSON.stringify({
                            email: email,
                            name: email.split('@')[0]
                        }));
                    } else {
                        sessionStorage.setItem('spirita-logged-in', 'true');
                        sessionStorage.setItem('spirita-current-user', JSON.stringify({
                            email: email,
                            name: email.split('@')[0]
                        }));
                    }

                    showSuccess('Login successful! Redirecting...');
                    
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            });

            // Forgot password handler
            $('#forgot-password').on('click', function(e) {
                e.preventDefault();
                const email = $('#email').val().trim();
                
                if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showSuccess('Password reset link sent to ' + email);
                } else {
                    showError('Please enter a valid email address first.');
                }
            });

            // Social login handlers (demo)
            $('.social-btn').on('click', function() {
                const provider = $(this).hasClass('google') ? 'Google' : 
                                $(this).hasClass('facebook') ? 'Facebook' : 'Twitter';
                
                showError(provider + ' login is not configured in this demo.');
            });

            function showError(message) {
                $('#error-text').text(message);
                $('#error-message').fadeIn(300);
                $('#success-message').hide();
            }

            function showSuccess(message) {
                $('#success-text').text(message);
                $('#success-message').fadeIn(300);
                $('#error-message').hide();
            }

            // Check if already logged in
            if (localStorage.getItem('spirita-logged-in') === 'true' || 
                sessionStorage.getItem('spirita-logged-in') === 'true') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
